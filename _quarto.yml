project:
  type: website
  output-dir: docs

website:
  title: "Identificação de Sistemas"
  
format:
  html:
    theme: [default, TemaRTx.scss]
    lang: pt-BR

  revealjs:
    theme: [simple, tema.scss]
    transition: fade
    slide-number: true
    footer: ""
    width: 1600      # Largura
    height: 900       # Altura
    code-theme: monokai
    code-font-size: 2.0em
    code-line-numbers: true
    title-slide-attributes:
      data-background-image: "imgs/ufpa-colorido.png"
      data-background-size: "84px"
      data-background-position: "top 45px center"
    