name: Publicar Aula no GitHub Pages

on:
  push:
    branches: [ main ]

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy scipy matplotlib jupyter pyyaml

      - name: Install TinyTeX (usado pelo filtro quarto-tikz)
        run: |
          quarto install tinytex --no-prompt
          echo "$HOME/.TinyTeX/bin/x86_64-linux" >> "$GITHUB_PATH"
          export PATH="$HOME/.TinyTeX/bin/x86_64-linux:$PATH"
          tlmgr update --self
          tlmgr install pgf standalone xcolor

      - name: Render and Publish
        uses: quarto-dev/quarto-actions/publish@v2
        with:
          target: gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}